<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | StockTool</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card p-4 p-sm-5">
                
                <!-- Logo / Header -->
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-2" style="width: 50px; height: 50px;">
                        <i class="bi bi-graph-up-arrow fs-4"></i>
                    </div>
                    <h3 class="fw-bold text-dark m-0">Welcome Back</h3>
                    <p class="text-muted small">Log in to manage your stocks</p>
                </div>

                <!-- Django Login Form -->
                <form method="POST">
                    {% csrf_token %}
                    <!-- Yeh block dono templates mein {% csrf_token %} ke niche paste kar do -->
{% if messages %}
    <div class="mt-2">
        {% for message in messages %}
            <div class="alert alert-danger p-2 small text-center" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
                    
                    <!-- Username Field -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="username" class="form-control bg-light border-start-0" placeholder="Enter username" required>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control bg-light border-start-0" placeholder="••••••••" required>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted small m-0">Don't have an account? <a href="{% url 'register' %}" class="text-primary fw-semibold text-decoration-none">Create one</a></p>
                </div>

            </div>
        </div>
    </div>
</div>

</body>
</html>
