<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FAZ Metrics{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg-body: #f4f6f9; --bg-card: #ffffff; --text-main: #212529; --text-muted: #6c757d; --border-color: #dee2e6; }
        [data-bs-theme="dark"] { --bg-body: #0f172a; --bg-card: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --border-color: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); color: var(--text-main); transition: background-color 0.3s, color 0.3s; }
        .sidebar { min-height: 100vh; background: #1e293b; color: #fff; }
        .sidebar .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 8px; padding: 12px; transition: all 0.2s; }
        .sidebar .nav-link.active { background: #3b82f6; color: #fff; }
        .sidebar .nav-link:hover:not(.active) { background: #334155; color: #fff; }
        .card { border: none; border-radius: 12px; background-color: var(--bg-card); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-logout { color: #f87171; border: 1px solid rgba(248, 113, 113, 0.2); transition: all 0.3s; }
        .btn-logout:hover { background-color: #ef4444; color: white; }
        .theme-toggle-btn { background: #334155; color: #f59e0b; border: 1px solid #475569; }
        .btn-settings-header { color: var(--text-muted); border: 1px solid var(--border-color); background-color: var(--bg-card); padding: 8px 12px; border-radius: 8px; }
        /* Table Dynamic Theme Adaptability */
        .table { color: var(--text-main) !important; }
        .table th { background-color: var(--bg-body) !important; color: var(--text-muted) !important; border-bottom-color: var(--border-color) !important; }
        .table td { background-color: var(--bg-card) !important; border-bottom-color: var(--border-color) !important; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- SIDEBAR -->
        <div class="col-md-3 col-lg-2 sidebar p-4 d-flex flex-column justify-content-between">
            <div>
                <div class="d-flex align-items-center mb-4 gap-2">
                    <i class="bi bi-graph-up-arrow text-primary fs-3"></i>
                    <h4 class="m-0 fw-bold text-white">FAZ Metrics</h4>
                </div>
                <hr class="text-secondary">
                <div class="bg-dark p-3 rounded mb-4 text-center">
                    <div class="fs-1 text-primary"><i class="bi bi-person-circle"></i></div>
                    <h6 class="m-0 fw-bold text-white">{{ request.user.username }}</h6>
                    <span class="badge bg-success w-100 fs-6 mt-2">Reference Wallet Loaded</span>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link {% block active_dash %}{% endblock %}" href="/stocks/dashboard/"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link {% block active_settings %}{% endblock %}" href="/stocks/settings/"><i class="bi bi-gear me-2"></i> Settings</a></li>
                </ul>
            </div>
            <div>
                <button class="btn theme-toggle-btn w-100 mb-3 rounded-3" id="themeToggleBtn" onclick="toggleThemeMode()">
                    <i class="bi bi-sun-fill" id="themeIcon"></i> <span id="themeText">Light Mode</span>
                </button>
                <a class="btn btn-logout w-100 mb-3 rounded-3" href="/stocks/logout/"><i class="bi bi-box-arrow-right"></i> Logout</a>
                <p class="text-muted small text-center m-0">© 2026 FAZ Metrics</p>
            </div>
        </div>

        <!-- MAIN CONTENT AREA -->
        <div class="col-md-9 col-lg-10 p-4">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 card p-4 flex-row">
                <div>
                    <h2 class="fw-bold m-0">{% block header_title %}Panel{% endblock %}</h2>
                </div>
                <div class="dropdown">
                    <button class="btn btn-settings-header" type="button" data-bs-toggle="dropdown"><i class="bi bi-gear-fill"></i></button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                        <li><a class="dropdown-item" href="/stocks/settings/"><i class="bi bi-gear me-2"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="/stocks/logout/"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                    </ul>
                </div>
            </div>

            <!-- Dynamic Content Injection -->
            {% block content %}
            {% endblock %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if (localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-bs-theme', 'dark'); updateThemeUI(true); }
    function toggleThemeMode() {
        const currentTheme = document.documentElement.getAttribute('data-bs-theme');
        if (currentTheme === 'dark') { document.documentElement.removeAttribute('data-bs-theme'); localStorage.setItem('theme', 'light'); updateThemeUI(false); }
        else { document.documentElement.setAttribute('data-bs-theme', 'dark'); localStorage.setItem('theme', 'dark'); updateThemeUI(true); }
    }
    function updateThemeUI(isDark) {
        const icon = document.getElementById('themeIcon'); const text = document.getElementById('themeText');
        if (isDark) { icon.className = 'bi bi-moon-stars-fill'; text.innerText = 'Dark Mode'; }
        else { icon.className = 'bi bi-sun-fill'; text.innerText = 'Light Mode'; }
    }
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
